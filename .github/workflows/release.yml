name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) — native arm64, no cross-compilation needed
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app bundle
        run: npm run tauri build -- --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep --force --sign - \
            --entitlements src-tauri/entitlements.plist \
            "src-tauri/target/release/bundle/macos/Voz Local.app"

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          mkdir -p "src-tauri/target/release/bundle/dmg"
          hdiutil create \
            -volname "Voz Local" \
            -srcfolder "src-tauri/target/release/bundle/macos/Voz Local.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/dmg/Voz Local_${VERSION}_aarch64.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Voz Local ${{ github.ref_name }}"
          body: |
            ## Instalación

            1. Descarga el `.dmg`
            2. Ábrelo y arrastra **Voz Local** a Aplicaciones
            3. **Primera vez:** clic derecho → Abrir (macOS pedirá confirmación porque la app no está notarizada)
            4. Concede permisos de **Micrófono** y **Accesibilidad**
            5. Descarga el modelo Whisper desde la pantalla de bienvenida
            6. ¡Listo! Usa `Alt+Space` para dictar

            > Si macOS dice "dañado": abre Terminal y ejecuta `sudo xattr -cr /Applications/Voz\ Local.app`

            > Requiere macOS 12+ · Apple Silicon (M1/M2/M3/M4)
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
