name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) — native arm64, no cross-compilation needed
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app bundle
        run: npm run tauri build -- --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep --force --sign - \
            --entitlements src-tauri/entitlements.plist \
            "src-tauri/target/release/bundle/macos/Voz Local.app"

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          mkdir -p "src-tauri/target/release/bundle/dmg"
          hdiutil create \
            -volname "Voz Local" \
            -srcfolder "src-tauri/target/release/bundle/macos/Voz Local.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/dmg/Voz Local_${VERSION}_aarch64.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Voz Local ${{ github.ref_name }}"
          body: |
            ## Installation

            1. Download the `.dmg`
            2. Open it and drag **Voz Local** to Applications
            3. **First launch:** right-click → Open (macOS will ask for confirmation since the app is not notarized)
            4. Grant **Microphone** and **Accessibility** permissions
            5. Download a Whisper model from the welcome screen
            6. Press `Alt+Space` to start dictating

            > If macOS says the app is damaged: open Terminal and run `sudo xattr -cr /Applications/Voz\ Local.app`

            > Requires macOS 14 (Sonoma) or later · Apple Silicon (M1/M2/M3/M4)
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
